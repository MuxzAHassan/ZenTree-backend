# [FIX 2026-03-29] Updated Swagger docs with all new endpoints, validation errors, and standardized responses
openapi: 3.0.0

info:
  title: ZenTree / NakUrut API
  version: "2.0.0"
  description: |
    Backend API for the NakUrut massage booking platform.
    - Auth endpoints (signup/login) include input validation
    - All authenticated endpoints require a Bearer JWT token
    - Rate limits: auth endpoints 20 req/15min, general API 100 req/15min

servers:
  - url: http://localhost:5000/api
    description: Local development
  - url: https://zentree-backend-24l6.onrender.com/api
    description: Production server

paths:
  # ==================== AUTH ====================
  /auth/signup:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User created successfully
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      role:
                        type: string
        "400":
          description: Validation error or user already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit exceeded
        "500":
          description: Server error

  /auth/login:
    post:
      summary: User login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: email@email.com
                password:
                  type: string
                  example: password123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    description: JWT token (expires in 1 hour)
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
        "500":
          description: Internal server error

  # ==================== USERS ====================
  /users/profile:
    get:
      summary: Get authenticated user's full profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          description: Authorization header or token missing
        "403":
          description: Invalid or expired token
        "404":
          description: User not found

  # ==================== BOOKINGS ====================
  /bookings:
    post:
      summary: Create a new booking
      tags: [Bookings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRequest"
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  booking:
                    $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Not authenticated

    get:
      summary: Get logged-in user's bookings
      tags: [Bookings]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user's bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  bookings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
        "401":
          description: Not authenticated

  /bookings/partner:
    get:
      summary: Get bookings assigned to logged-in partner
      tags: [Bookings]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of partner's assigned bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  bookings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
        "401":
          description: Not authenticated

  /bookings/{id}:
    get:
      summary: Get a specific booking by ID
      tags: [Bookings]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  booking:
                    $ref: "#/components/schemas/Booking"
        "403":
          description: Not authorized to view this booking
        "404":
          description: Booking not found

  /bookings/{id}/status:
    put:
      summary: Update booking status (accept/reject/cancel/complete)
      tags: [Bookings]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [accepted, rejected, completed, cancelled]
                  description: "Partners can accept/reject/complete. Users can cancel."
      responses:
        "200":
          description: Booking status updated
        "400":
          description: Invalid status value
        "403":
          description: Not authorized to change this status
        "404":
          description: Booking not found

  # ==================== PARTNERS ====================
  /partners/nearby:
    get:
      summary: List all available partners/massagers
      tags: [Partners]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  massagers:
                    type: array
                    items:
                      $ref: "#/components/schemas/PartnerProfile"
        "401":
          description: Not authenticated

  /partners/{id}:
    get:
      summary: Get a specific partner's details
      tags: [Partners]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  partner:
                    $ref: "#/components/schemas/PartnerProfile"
        "404":
          description: Partner not found

  /partners/profile:
    put:
      summary: Partner updates their own profile
      tags: [Partners]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                gender:
                  type: string
      responses:
        "200":
          description: Profile updated successfully
        "403":
          description: Only partners can access this endpoint
        "404":
          description: Partner not found

# ==================== COMPONENTS ====================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SignupRequest:
      type: object
      required:
        - firstName
        - lastName
        - gender
        - dateOfBirth
        - phone
        - email
        - password
      properties:
        firstName:
          type: string
          example: Ahmad
        lastName:
          type: string
          example: Hassan
        gender:
          type: string
          example: Male
        dateOfBirth:
          type: string
          format: date
          example: "2002-03-13"
        phone:
          type: string
          example: "+60142659148"
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 6
          example: password123
        role:
          type: string
          enum: [user, partner]
          default: user
          description: "User role — defaults to 'user' if not provided"

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        gender:
          type: string
        dateOfBirth:
          type: string
          format: date
        role:
          type: string
          enum: [user, partner]

    PartnerProfile:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        gender:
          type: string

    BookingRequest:
      type: object
      required:
        - massagerId
        - serviceType
        - date
        - time
      properties:
        massagerId:
          type: integer
          description: ID of the partner/massager
          example: 5
        serviceType:
          type: string
          example: Full Body Massage
        date:
          type: string
          format: date
          example: "2026-04-15"
        time:
          type: string
          example: "14:30"

    Booking:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        massagerId:
          type: integer
        serviceType:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected, completed, cancelled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid email or password

    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Please enter a valid email address
